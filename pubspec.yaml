name: aya_claude
description: Prof AYA la Queen - Islamic Learning App with Offline AI
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ⭐ STATE MANAGEMENT
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # 📱 NAVIGATION & ROUTING
  go_router: ^12.0.0

  # 💾 LOCAL DATABASE
  sqflite: ^2.3.0
  path: ^1.8.3
  sqflite_common_ffi: ^2.3.0

  # 🔥 FIREBASE (Optional for sync)
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_analytics: ^10.7.0

  # 🌐 NETWORKING
  dio: ^5.3.0
  retrofit: ^4.0.0
  cookie_jar: ^4.0.7

  # 📦 JSON SERIALIZATION
  json_serializable: ^6.7.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # 🎨 UI & DESIGN
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  smooth_page_indicator: ^1.1.0

  # 🗣️ INTERNATIONALIZATION
  intl: ^0.19.0
  flutter_localizations:
    sdk: flutter

  # 🧠 AI/ML - Loca# dart_llm: ^0.2.0l LLM
  # dart_llm: ^0.2.0

  # 📊 LOGGING
  logger: ^2.0.0

  # 🎵 AUDIO
  just_audio: ^0.9.31

  # 📝 FORMS & VALIDATION
  formz: ^0.6.0

  # 🛠️ UTILITIES
  get_it: ^7.6.0
  dartz: ^0.10.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 🧪 TESTING
  mocktail: ^1.0.0

  # 📝 CODE GENERATION
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  freezed: ^2.4.1
  json_serializable: ^6.7.0

  # 🔍 CODE ANALYSIS
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/quran/
    - assets/hadith/
    - assets/vocabulary/
    - assets/images/
    - assets/models/
    - assets/fonts/
  
  fonts:
    - family: ArabicFont
      fonts:
        - asset: assets/fonts/ArabicFont.ttf
        - asset: assets/fonts/ArabicFontBold.ttf
          weight: 700
